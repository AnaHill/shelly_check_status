name: Check LVV daily

on:
  schedule:
    - cron: '0 6 * * *'  # 6:00 UTC = 8-9 AM Helsinki; checks yesterday's data
  workflow_dispatch:  # allows manual trigger from GitHub UI

jobs:
  check-lvv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check if LVV was on yesterday
        run: python check_lvv.py
        env:
          SMART_MONITORING_KEY: ${{ secrets.SMART_MONITORING_KEY }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NOTIFY_ALWAYS: ${{ vars.NOTIFY_ALWAYS }}
          # Optional: override relay name (default: LVV)
          # RELAY_NAME: LVV
