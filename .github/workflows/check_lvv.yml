name: Check LVV daily

on:
  schedule:
    # Two entries so it always fires at 21:15 Helsinki local time.
    # The script skips whichever run doesn't land at Helsinki hour 21.
    - cron: '15 18 * * *'  # 21:15 EEST (UTC+3, summer, late-Mar to late-Oct)
    - cron: '15 19 * * *'  # 21:15 EET  (UTC+2, winter, late-Oct to late-Mar)
  workflow_dispatch:  # allows manual trigger from GitHub UI

jobs:
  check-lvv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check if LVV was on today
        run: python check_lvv.py
        env:
          SMART_MONITORING_KEY: ${{ secrets.SMART_MONITORING_KEY }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NOTIFY_ALWAYS: ${{ vars.NOTIFY_ALWAYS }}
          # Optional: override relay name (default: LVV)
          # RELAY_NAME: LVV
